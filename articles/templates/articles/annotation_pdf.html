{% load static %}<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fichamento – {{ article.title }}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #1f2933;
            max-width: 760px;
            margin: 0 auto;
            padding: 40px 28px;
            line-height: 1.6;
        }
        header.doc-head {
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 16px;
            margin-bottom: 24px;
        }
        header.doc-head .eyebrow {
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            margin: 0 0 4px;
        }
        header.doc-head h1 { font-size: 22px; margin: 0 0 6px; }
        header.doc-head p { margin: 0; color: #475569; font-size: 14px; }

        /* Conteúdo Markdown renderizado. */
        .markdown-body h1 { font-size: 20px; }
        .markdown-body h2 { font-size: 18px; }
        .markdown-body h3 { font-size: 16px; }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { margin: 20px 0 8px; }
        .markdown-body p { margin: 0 0 12px; }
        .markdown-body ul, .markdown-body ol { margin: 0 0 12px; padding-left: 24px; }
        .markdown-body blockquote {
            margin: 0 0 12px;
            padding: 4px 16px;
            border-left: 3px solid #cbd5e1;
            color: #475569;
        }
        .markdown-body code {
            background: #f1f5f9;
            padding: 1px 5px;
            border-radius: 4px;
            font-size: 0.9em;
        }
        .markdown-body pre {
            background: #f1f5f9;
            padding: 12px 14px;
            border-radius: 8px;
            overflow: auto;
        }
        .markdown-body pre code { background: none; padding: 0; }
        .markdown-body a { color: #4f46e5; }
        .markdown-body img { max-width: 100%; }
        .markdown-body table { border-collapse: collapse; width: 100%; margin: 0 0 12px; }
        .markdown-body th, .markdown-body td { border: 1px solid #cbd5e1; padding: 6px 10px; text-align: left; }

        @media print {
            body { padding: 0; }
            @page { margin: 18mm; }
        }
    </style>
</head>
<body>
    <header class="doc-head">
        <p class="eyebrow">Fichamento</p>
        <h1>{{ article.title }}</h1>
        <p>{{ article.author }}{% if article.year %} · {{ article.year }}{% endif %}</p>
    </header>

    <div class="markdown-body" id="content"></div>

    {{ annotation.content|json_script:"fichamento-md" }}

    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
    <script>
        (function () {
            var md = JSON.parse(document.getElementById('fichamento-md').textContent);
            document.getElementById('content').innerHTML = marked.parse(md || '');
            // Abre o diálogo de impressão após renderizar (salvar como PDF).
            window.addEventListener('load', function () {
                setTimeout(function () { window.print(); }, 150);
            });
        })();
    </script>
</body>
</html>
