{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro – ArticleHub</title>
    <link rel="stylesheet" href="{% static 'main/css/auth.css' %}">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-logo">
                <h1>ArticleHub</h1>
                <p>Seu espaço para artigos e ideias</p>
            </div>

            {% if messages %}
                <ul class="messages">
                    {% for message in messages %}
                        <li class="{{ message.tags }}">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}

            <h2 class="auth-title">Criar conta</h2>

            <form method="post">
                {% csrf_token %}
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" placeholder="Escolha um usuário" required autofocus>
                </div>
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="Seu endereço de e-mail">
                </div>
                <div class="form-group">
                    <label for="password1">Senha</label>
                    <input type="password" id="password1" name="password1" placeholder="Crie uma senha" required>
                </div>
                <div class="form-group">
                    <label for="password2">Confirmar senha</label>
                    <input type="password" id="password2" name="password2" placeholder="Repita sua senha" required>
                </div>
                <button type="submit" class="btn-primary">Criar conta</button>
            </form>

            <div class="auth-footer">
                Já tem uma conta? <a href="{% url 'login' %}">Entrar</a>
            </div>
        </div>
    </div>
</body>
</html>
